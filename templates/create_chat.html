<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать чат</title>
</head>
<body>
    <h1>Создать новый чат</h1>
    <form method="post">
        <label>Название чата:</label>
        <input type="text" name="title" required><br>
        <label>Участники (логины через запятую):</label>
        <input type="text" name="members" placeholder="" required><br>
        <button type="submit">Создать</button>
    </form>
    <p><a href="/">На главную</a></p>
</body>
</html>
