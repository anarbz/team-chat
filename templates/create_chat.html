{% extends "base.html" %}

{% block content %}
    <h1>Создать новый чат</h1>

    {% if errors %}
        <div class="alert alert-danger" role="alert">
            <strong>Ошибки:</strong><br>
            {% for err in errors %}
                {{ err }}<br>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post">
        <label class="form-label">Название чата:</label>
        <input class="form-control mb-3" type="text" name="title" required>

        <label class="form-label">Участники (логины):</label><br>
        <div id="members-container">
            <div class="mb-2">
                <input class="form-control" type="text" name="logins" placeholder="Логин">
                <button class="btn btn-outline-secondary btn-sm mt-1"
                        type="button"
                        onclick="this.parentElement.remove()">
                    Удалить
                </button>
            </div>
        </div>

        <button class="btn btn-secondary btn-sm mt-2"
                type="button"
                onclick="addMemberRow()">
            Добавить участника
        </button>

        <br><br>

        <button class="btn btn-primary" type="submit">Создать чат</button>
    </form>

    {% if success_message %}
        <div class="alert alert-success mt-3" role="alert">
            {{ success_message }}
        </div>
    {% endif %}

    <p class="mt-3">
        <a class="btn btn-outline-secondary" href="/dashboard">На главную</a>
    </p>

    <script>
        function addMemberRow() {
            const container = document.getElementById('members-container');
            const div = document.createElement('div');
            div.className = 'mb-2';
            div.innerHTML = '<input class="form-control" type="text" name="logins" placeholder="Логин"> <button class="btn btn-outline-secondary btn-sm mt-1" type="button" onclick="this.parentElement.remove()">Удалить</button>';
            container.appendChild(div);
        }
    </script>
{% endblock %}
