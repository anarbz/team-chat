<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>{{ title }}</title></head>
<body>
    <h1>Регистрация</h1>
    <form action="" method="post">
        {{ form.hidden_tag() }}
        <p>
            {{ form.login.label }}<br>
            {{ form.login() }}
        </p>
        <p>
            {{ form.email.label }}<br>
            {{ form.email() }}
        </p>
        <p>
            {{ form.password.label }}<br>
            {{ form.password() }}
        </p>
        <p>
            {{ form.password_again.label }}<br>
            {{ form.password_again() }}
        </p>
        <p>{{ form.submit() }}</p>
        {% if message %} <div>{{ message }}</div> {% endif %}
    </form>
</body>
</html>
