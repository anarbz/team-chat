<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .actions { margin: 20px 0; }
        button, input { padding: 8px 12px; }
        .join-chat { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Добро пожаловать, {{ current_user.login }}!</h1>
    <div class="actions">
        <a href="/chats"><button>Мои чаты</button></a>
        <a href="/create_chat"><button>Создать новый чат</button></a>
        <a href="/logout"><button>Выйти</button></a>
    </div>

    <div class="join-chat">
        <h3>Войти в существующий чат по ID</h3>
        <form method="post" action="/enter_chat">
            <input type="number" name="chat_id" placeholder="Введите ID чата" required>
            <button type="submit">Перейти в чат</button>
        </form>
    </div>
</body>
</html>
