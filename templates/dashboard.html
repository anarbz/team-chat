{% extends "base.html" %}

{% block content %}
    <h1>Добро пожаловать, {{ current_user.login }}!</h1>

    <div class="mb-4">
        <a class="btn btn-primary" href="/create_chat?type=personal">
            Начать беседу
        </a>

        <a class="btn btn-secondary" href="/create_chat?type=group">
            Создать групповой чат
        </a>

        <a class="btn btn-outline-primary" href="/chats">
            Мои чаты
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <h5>Войти в существующий чат по ID</h5>

            <form method="post" action="/enter_chat" class="d-flex gap-2">
                <input class="form-control"
                       type="number"
                       name="chat_id"
                       placeholder="Введите ID чата"
                       required>
                <button class="btn btn-primary" type="submit">
                    Перейти
                </button>
            </form>
        </div>
    </div>
{% endblock %}
