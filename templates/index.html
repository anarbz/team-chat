<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>t-chat</title>
</head>
<body>
    <h1>Team-Chat</h1>
    <h2>Войти в чат</h2>
    <form method="post">
        <input type="text" name="username" placeholder="Ваше имя" required>
        <input type="number" name="chat_id" placeholder="ID чата" required>
        <button type="submit">Войти или создать чат</button>
    </form>
    <p><a href="/create_chat">Создать новый чат</a></p>
</body>
</html>
