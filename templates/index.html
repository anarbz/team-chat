<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>t-chat</title>
</head>
<body>
    <h1>Team-Chat работает</h1>
    <h2>пользователи</h2>
    {% if users %}
        <ul>
            {% for user in users %}
                <li>{{ user.login }} — {{ user.email }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>Пользователей пока нет.</p>
    {% endif %}
    <p><a href="/chat">Перейти в чат</a></p>
</body>
</html>
