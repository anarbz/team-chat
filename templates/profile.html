{% extends "base.html" %}

{% block content %}
<div class="auth-card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="width: 100px; height: 100px; background: var(--primary-color); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #0f172a;">
            {{ current_user.login[0] | upper }}
        </div>
        <h2 style="margin-top: 1rem;">Профиль пользователя</h2>
    </div>

    <div class="profile-info">
        <p><strong>Логин:</strong> {{ current_user.login }}</p>
        <p><strong>Email:</strong> {{ current_user.email }}</p>
        <p><strong>Дата регистрации:</strong> {{ current_user.created_date.strftime('%d.%m.%Y') }}</p>
    </div>

    <div style="margin-top: 2rem;">
        <a href="/logout" class="btn-primary" style="text-align: center; display: block; text-decoration: none; background: #ef4444;">Выйти из аккаунта</a>
    </div>
</div>
{% endblock %}
