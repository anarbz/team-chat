<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
          integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
          crossorigin="anonymous">

    <title>{{ title if title else "Team-Chat" }}</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">Team-Chat</a>

            <div class="navbar-nav me-auto">
                <a class="nav-link text-white" href="/chats">Мои чаты</a>
                <a class="nav-link text-white" href="/create_chat?type=personal">Начать беседу</a>
                <a class="nav-link text-white" href="/create_chat?type=group">Групповой чат</a>
            </div>

            <div class="d-flex">
                {% if current_user.is_authenticated %}
                    <span class="navbar-text text-white me-3">
                        {{ current_user.login }}
                    </span>
                    <a class="btn btn-outline-light btn-sm" href="/logout">Выйти</a>
                {% else %}
                    <a class="btn btn-outline-light btn-sm me-2" href="/login">Войти</a>
                    <a class="btn btn-light btn-sm" href="/register">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
